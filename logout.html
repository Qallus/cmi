<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logged Out — Constructed Matter</title>
  <link rel="icon" type="image/png" href="https://orange-coyote-460839.hostingersite.com/wp-content/uploads/2026/03/cmi_favicon_black.png" id="faviconEl" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Roboto:ital,wght@0,300;0,400;0,500;0,700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { cmi: { dark: '#0f0f0f', 'dark-light': '#161616', light: '#F7F5F2', 'gold-dark': '#C9A46E', 'gold-light': '#9E6F2E' } },
          fontFamily: { display: ['"DM Serif Display"', 'Georgia', 'serif'], body: ['Roboto', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Roboto', system-ui, sans-serif; }
  </style>
</head>

<body class="bg-cmi-light dark:bg-cmi-dark min-h-screen flex flex-col">

  <header class="border-b border-neutral-200/60 dark:border-neutral-800/60 bg-cmi-light/90 dark:bg-cmi-dark/90 backdrop-blur-md">
    <div class="max-w-[1400px] mx-auto px-6 h-[64px] flex items-center justify-between">
      <a href="index.html" class="flex items-center">
        <img src="https://orange-coyote-460839.hostingersite.com/wp-content/uploads/2026/03/CMI_Logo.svg" alt="Constructed Matter" class="block dark:hidden h-8 w-auto" />
        <img src="https://orange-coyote-460839.hostingersite.com/wp-content/uploads/2026/03/CMI_Logo_White.svg" alt="Constructed Matter" class="hidden dark:block h-8 w-auto" />
      </a>
      <button id="themeToggle" aria-label="Toggle theme" class="w-9 h-9 rounded-lg flex items-center justify-center text-neutral-600 dark:text-neutral-400 hover:bg-neutral-100 dark:hover:bg-neutral-800 transition-colors">
        <svg class="w-4 h-4 hidden dark:block" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="w-4 h-4 block dark:hidden" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
    </div>
  </header>

  <div class="flex-1 flex items-center justify-center px-6 py-16">
    <div class="w-full max-w-md text-center">
      <div class="w-16 h-16 rounded-2xl bg-cmi-gold-light/10 dark:bg-cmi-gold-dark/10 flex items-center justify-center mb-6 mx-auto">
        <svg class="w-8 h-8 text-cmi-gold-light dark:text-cmi-gold-dark" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/>
        </svg>
      </div>
      <h1 class="font-display text-3xl text-neutral-900 dark:text-neutral-100 mb-3">You've Been Logged Out</h1>
      <p class="text-sm text-neutral-500 dark:text-neutral-400 mb-8 leading-relaxed">
        You've been successfully signed out of your Constructed Matter account. See you next time.
      </p>
      <div class="flex flex-col sm:flex-row items-center justify-center gap-3">
        <a href="login.html" class="inline-flex items-center gap-2 px-6 py-3 rounded-lg text-sm font-medium bg-cmi-gold-light dark:bg-cmi-gold-dark text-white hover:opacity-90 transition-opacity">
          Log Back In
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14m-7-7l7 7-7 7"/></svg>
        </a>
        <a href="index.html" class="inline-flex items-center gap-2 px-6 py-3 rounded-lg text-sm font-medium border border-neutral-300 dark:border-neutral-700 text-neutral-700 dark:text-neutral-300 hover:border-cmi-gold-light dark:hover:border-cmi-gold-dark hover:text-cmi-gold-light dark:hover:text-cmi-gold-dark transition-colors">
          Return Home
        </a>
      </div>
    </div>
  </div>

  <script>
    const html = document.documentElement;
    const faviconEl = document.getElementById('faviconEl');
    function applyTheme(isDark) {
      html.classList.toggle('dark', isDark); html.classList.toggle('light', !isDark);
      if (faviconEl) faviconEl.href = isDark ? 'https://orange-coyote-460839.hostingersite.com/wp-content/uploads/2026/03/cmi_favicon_white.png' : 'https://orange-coyote-460839.hostingersite.com/wp-content/uploads/2026/03/cmi_favicon_black.png';
    }
    const stored = localStorage.getItem('cmi-theme');
    applyTheme(stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches));
    document.getElementById('themeToggle').addEventListener('click', function() {
      const nd = !html.classList.contains('dark'); applyTheme(nd); localStorage.setItem('cmi-theme', nd ? 'dark' : 'light');
    });
    // Clear any session data
    localStorage.removeItem('cmi-user');
    sessionStorage.clear();
  </script>
</body>
</html>
